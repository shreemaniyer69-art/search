<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>OmniSearch: Wiki + News + Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

            background-color: #ffffff;

</head>
<body class="min-h-screen">

        <!-- 📚 Wikipedia Knowledge Panel -->

            <div class="knowledge-panel p-5 relative">
                <span class="kp-source-badge">Wikipedia</span>
                <div class="flex flex-col md:flex-row gap-6">
                    <div id="kp-image" class="w-full md:w-48 flex-shrink-0 poster-container">

                    </div>
                    <div class="flex-grow min-w-0">

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const mainResults = document.getElementById('main-results');
        const knowledgePanel = document.getElementById('knowledgePanel');
        const officialSiteBanner = document.getElementById('officialSiteBanner');
        const stats = document.getElementById('stats');
        const loading = document.getElementById('loading');
        const welcome = document.getElementById('welcomeMessage');

        const NEWS_SOURCES = [
            { name: 'BBC', domain: 'bbc.com', searchUrl: 'https://www.bbc.com/search?q=', color: 'source-bbc' },
            { name: 'CNN', domain: 'cnn.com', searchUrl: 'https://www.cnn.com/search?q=', color: 'source-cnn' },
            { name: 'Guardian', domain: 'theguardian.com', searchUrl: 'https://www.theguardian.com/search?q=', color: 'source-guardian' },
            { name: 'Reuters', domain: 'reuters.com', searchUrl: 'https://www.reuters.com/site-search/?query=', color: 'source-reuters' },
            { name: 'Al Jazeera', domain: 'aljazeera.com', searchUrl: 'https://www.aljazeera.com/search/', color: 'source-aljazeera' },
            { name: 'AP News', domain: 'apnews.com', searchUrl: 'https://apnews.com/search/', color: 'source-ap' },
            { name: 'Forbes', domain: 'forbes.com', searchUrl: 'https://www.forbes.com/search/?q=', color: 'source-forbes' }
        ];

        async function scrapeWebsite(url, timeout = 10000) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                const response = await fetch(
                    `https://v0-web-scraper-api-three.vercel.app/api/proxy?url=${encodeURIComponent(url)}`,
                    { signal: controller.signal }
                );
                clearTimeout(timeoutId);
                const data = await response.json();
                if (!response.ok) return null;
                return data.html; 
            } catch (error) {
                return null;
            }
        }

        function extractCleanText(element) {
            if (!element) return '';
            const clone = element.cloneNode(true);
            clone.querySelectorAll('style, script, link, .reference, .mw-empty-elt, sup, .navbox, .sidebar, .infobox').forEach(el => el.remove());
            clone.querySelectorAll('br').forEach(br => br.replaceWith(' '));
            let text = clone.textContent || '';
            return text.replace(/\s+/g, ' ').trim();
        }

        function getFaviconUrl(domain) {
            return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        }

        function extractOfficialWebsite(html) {
            if (!html) return null;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const infobox = doc.querySelector('.infobox');
            if (!infobox) return null;
            
            const websiteLabels = ['website', 'url', 'homepage', 'official website', 'official site', 'web'];
            
            for (const row of infobox.querySelectorAll('tr')) {
                const th = row.querySelector('th');
                const td = row.querySelector('td');
                if (!th || !td) continue;
                
                const label = extractCleanText(th).toLowerCase();
                if (websiteLabels.some(wl => label.includes(wl))) {
                    const link = td.querySelector('a[href^="http"]');
                    if (link && link.href) {
                        return { url: link.href, label: extractCleanText(th) };
                    }
                    const text = extractCleanText(td);
                    const urlMatch = text.match(/https?:\/\/[^\s\]]+/i);
                    if (urlMatch) {
                        return { url: urlMatch[0], label: extractCleanText(th) };
                    }
                }
            }
            return null;
        }

        function parseWikipedia(html, query, url) {
            if (!html || html.includes('Wikipedia does not have an article with this exact name')) return null;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            doc.querySelectorAll('.reference, style, script, .navbox, .sidebar').forEach(el => el.remove());

            const title = doc.querySelector('#firstHeading')?.textContent || query;
            const subtitle = doc.querySelector('.shortdescription')?.textContent || "General Information";
            
            const paragraphs = Array.from(doc.querySelectorAll('.mw-parser-output > p'))
                .filter(p => {
                    const text = p.textContent.trim();
                    return text.length > 50 && !text.startsWith('This article is about') && !text.includes('disambiguation');
                }).slice(0, 2);
            
            const snippet = (paragraphs[0] ? extractCleanText(paragraphs[0]).substring(0, 300) : '') + '...';
            const description = paragraphs[0] ? extractCleanText(paragraphs[0]) : "";
            
            const infoboxImg = doc.querySelector('.infobox img, .thumbimage');
            let imageUrl = null;
            if (infoboxImg) {
                const src = infoboxImg.src || infoboxImg.getAttribute('data-src');
                imageUrl = src?.startsWith('//') ? 'https:' + src : src;
            }
            
            const data = {};
            const infobox = doc.querySelector('.infobox');
            if (infobox) {
                infobox.querySelectorAll('tr').forEach(row => {
                    const th = row.querySelector('th');
                    const td = row.querySelector('td');
                    if (th && td) {
                        const label = extractCleanText(th);
                        const value = extractCleanText(td);
                        if (label && value && label.length < 30 && !label.toLowerCase().includes('map')) {
                            data[label] = value;
                        }
                    }
                });
            }
            return { title, subtitle, snippet, description, url, imageUrl, data };
        }

        // 🎬 Parse Movie Information from Wikipedia
        function parseMovieFromWikipedia(html, query, url) {
            if (!html) return null;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            
            // Check if it's a movie (has infobox film)
            const infobox = doc.querySelector('.infobox');
            if (!infobox) return null;
            
            // Look for film-specific fields
            const hasDirector = infobox.querySelector('th');
            const hasFields = Array.from(infobox.querySelectorAll('th')).some(th => {
                const text = extractCleanText(th).toLowerCase();
                return text.includes('director') || text.includes('producer') || text.includes('starring');
            });
            
            if (!hasFields) return null;
            
            const title = doc.querySelector('#firstHeading')?.textContent || query;
            const paragraphs = Array.from(doc.querySelectorAll('.mw-parser-output > p'))
                .filter(p => p.textContent.trim().length > 50).slice(0, 1);
            const description = paragraphs[0] ? extractCleanText(paragraphs[0]) : "";
            
            // Extract poster
            const posterImg = doc.querySelector('.infobox img');
            let posterUrl = null;
            if (posterImg) {
                const src = posterImg.src || posterImg.getAttribute('data-src');
                posterUrl = src?.startsWith('//') ? 'https:' + src : src;
            }
            
            // Extract movie details
            const movieData = {
                title,
                description,
                url,
                posterUrl,
                details: {}
            };
            
            const fields = ['Director', 'Producer', 'Starring', 'Release date', 'Running time', 'Country', 'Language', 'Budget', 'Box office', 'Genre'];
            
            infobox.querySelectorAll('tr').forEach(row => {
                const th = row.querySelector('th');
                const td = row.querySelector('td');
                if (th && td) {
                    const label = extractCleanText(th);
                    const value = extractCleanText(td);
                    if (fields.some(f => label.toLowerCase().includes(f.toLowerCase().slice(0, 8)))) {
                        movieData.details[label] = value;
                    }
                }
            });
            
            // Extract rating if available
            const ratingEl = doc.querySelector('[class*="rating"]');
            if (ratingEl) {
                movieData.rating = extractCleanText(ratingEl);
            }
            
            return movieData;
        }

        async function parseNewsSource(html, sourceConfig) {
            if (!html) return [];
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const results = [];
            
            const selectors = [
                'article a[href]',
                '.story a[href]',
                '[class*="card"] a[href]',
                '.result a[href]',
                '.entry-title a[href]',
                'h2 a[href], h3 a[href], h4 a[href]'
            ];
            
            const allLinks = [];
            for (const selector of selectors) {
                const links = doc.querySelectorAll(selector);
                for (const link of links) {
                    const href = link.getAttribute('href');
                    if (href && (href.includes('/news/') || href.includes('/article/') || href.includes('/story/') || href.startsWith('http'))) {
                        allLinks.push(link);
                    }
                }
            }
            
            const seen = new Set();
            for (const link of allLinks) {
                if (results.length >= 6) break;
                
                const href = link.getAttribute('href');
                if (!href) continue;
                
                let title = extractCleanText(link);
                if (title.length < 25 || title.length > 150) continue;
                if (title.toLowerCase().includes('subscribe') || title.toLowerCase().includes('privacy')) continue;
                if (seen.has(title)) continue;
                seen.add(title);
                
                // Find date
                let date = null;
                const parent = link.closest('article, .story, [class*="card"], .result, .entry');
                if (parent) {
                    const dateEl = parent.querySelector('time, [class*="date"], [class*="time"], .published');
                    if (dateEl) {
                        const dateText = dateEl.getAttribute('datetime') || extractCleanText(dateEl);
                        if (dateText && dateText.length < 50) {
                            date = dateText;
                        }
                    }
                }
                
                // Find snippet
                let snippet = '';
                if (parent) {
                    const desc = parent.querySelector('p:not(.meta):not(.date), [class*="summary"], [class*="description"], [class*="teaser"], [class*="excerpt"]');
                    if (desc) {
                        snippet = extractCleanText(desc);
                    }
                }
                if (!snippet) {
                    const next = link.parentElement?.nextElementSibling;
                    if (next && next.tagName === 'P') {
                        snippet = extractCleanText(next);
                    }
                }
                if (snippet.length > 200) snippet = snippet.substring(0, 197) + '...';
                if (!snippet) snippet = 'Read full article on ' + sourceConfig.name;
                
                // Build URL
                let url = href;
                if (!url.startsWith('http')) {
                    url = `https://${sourceConfig.domain}${url.startsWith('/') ? url : '/' + url}`;
                }
                
                results.push({
                    title: title.replace(/\s+/g, ' ').trim(),
                    snippet,
                    url,
                    source: sourceConfig.name,
                    sourceClass: sourceConfig.color,
                    domain: sourceConfig.domain,
                    date: date
                });
            }
            return results;
        }

        function parseESPN(html) {
            if (!html) return [];
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const results = [];
            const links = doc.querySelectorAll('a[href*="/story/"], a[href*="/video/"], a[href*="/game/"]');
            
            for (const link of links) {
                if (results.length >= 4) break;
                const href = link.getAttribute('href');
                if (!href) continue;
                
                let title = extractCleanText(link);
                if (title.length < 20 || title.length > 150) continue;
                if (title.toLowerCase().includes('privacy') || title.toLowerCase().includes('terms')) continue;
                
                const url = href.startsWith('http') ? href : `https://www.espn.com${href}`;
                results.push({
                    title,
                    snippet: 'Latest sports update from ESPN',
                    url,
                    source: 'ESPN',
                    sourceClass: 'source-espn',
                    domain: 'espn.com',
                    date: new Date().toLocaleDateString()
                });
            }
            return results;
        }

        function renderOfficialSiteBanner(websiteInfo, pageTitle) {
            officialSiteBanner.innerHTML = `
                <a href="${websiteInfo.url}" target="_blank" class="official-site-banner block no-underline">
                    <div class="official-site-icon">🌐</div>
                    <div class="official-site-content">
                        <h3>Official Website</h3>
                        <a href="${websiteInfo.url}" target="_blank" class="no-underline">
                            ${websiteInfo.url.replace('https://', '').replace('http://', '')}
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                        <div class="official-site-source">From Wikipedia • ${pageTitle}</div>
                    </div>
                </a>
            `;
            officialSiteBanner.classList.remove('hidden');
        }

        function renderKnowledgePanel(data) {
            if (!data) return;
            document.getElementById('kp-title').innerText = data.title;
            document.getElementById('kp-subtitle').innerText = data.subtitle || '';
            document.getElementById('kp-description').innerText = data.description || data.snippet || '';
            document.getElementById('kp-link').href = data.url;
            
            const imgBox = document.getElementById('kp-image');
            if (data.imageUrl) {
                imgBox.innerHTML = `<img src="${data.imageUrl}" class="w-full h-full object-cover" alt="${data.title}" onerror="this.parentElement.innerHTML='<span class=\\'poster-placeholder\\'>📚</span>'">`;
            } else {
                imgBox.innerHTML = `<span class="poster-placeholder">📚</span>`;
            }
            
            const detailsBox = document.getElementById('kp-details');
            detailsBox.innerHTML = '';
            const fields = ['Born', 'Died', 'Spouse', 'Children', 'Education', 'Occupation', 'Founded', 'Headquarters', 'League', 'Arena', 'Position', 'Industry', 'Revenue'];
            
            Object.entries(data.data || {}).forEach(([label, value]) => {
                if (fields.some(f => label.toLowerCase().includes(f.toLowerCase()))) {
                    detailsBox.innerHTML += `<div class="infobox-row text-sm"><span class="font-bold text-gray-900 infobox-label">${label}:</span><span class="text-gray-700 flex-1">${value}</span></div>`;
                }
            });
            knowledgePanel.classList.remove('hidden');
        }

        // 🎬 Render Movie Card
        function renderMovieCard(movie) {
            const domain = new URL(movie.url).hostname;
            const firstChar = domain.charAt(0).toUpperCase();
            
            let detailsHtml = '';
            Object.entries(movie.details).forEach(([label, value]) => {
                detailsHtml += `
                    <div class="movie-detail-item">
                        <span class="movie-detail-label">${label}:</span>
                        <span class="movie-detail-value">${value}</span>
                    </div>
                `;
            });
            
            return `
                <div class="movie-card">
                    <div class="movie-header">
                        ${movie.posterUrl ? `<img src="${movie.posterUrl}" class="movie-poster" alt="${movie.title}" onerror="this.style.display='none'">` : ''}
                        <div class="movie-info">
                            <h2 class="movie-title">${movie.title}</h2>
                            <div class="movie-meta-row">
                                ${movie.rating ? `<span class="movie-rating">★ ${movie.rating}</span>` : ''}
                                ${movie.details['Release date'] ? `<span class="movie-year">${movie.details['Release date']}</span>` : ''}
                                ${movie.details['Genre'] ? `<span class="movie-genre">${movie.details['Genre']}</span>` : ''}
                            </div>
                            <p class="movie-description">${movie.description}</p>
                            ${detailsHtml ? `<div class="movie-details">${detailsHtml}</div>` : ''}
                            <a href="${movie.url}" target="_blank" class="text-blue-600 hover:underline text-sm mt-2 inline-block">View on Wikipedia →</a>
                        </div>
                    </div>
                </div>
            `;
        }

        // 🎯 Render Result Card (Matching Image Style)
        function renderResultCard({ title, url, snippet, source, sourceClass, domain, date }) {
            const faviconUrl = getFaviconUrl(domain);
            const displayUrl = domain.replace('www.', '');
            
            return `
                <div class="result-card">
                    <div class="result-header">
                        <img src="${faviconUrl}" class="result-favicon" alt="${displayUrl}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${domain.charAt(0).toUpperCase()}</text></svg>'">
                        <div class="result-site-info">
                            <p class="result-site-name">${source || displayUrl}</p>
                            <p class="result-url">${displayUrl}</p>
                        </div>
                        <div class="result-menu">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                            </svg>
                        </div>
                    </div>
                    <a href="${url}" target="_blank" rel="noopener" class="result-title-link">${title}</a>
                    <p class="result-snippet">${snippet}</p>
                    ${date ? `<div class="result-meta"><span class="result-date">${date}</span>${source ? `<span>• <span class="${sourceClass}">${source}</span></span>` : ''}</div>` : ''}
                </div>
            `;
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            welcome.classList.add('hidden');
            mainResults.innerHTML = '';
            knowledgePanel.classList.add('hidden');
            officialSiteBanner.classList.add('hidden');
            loading.classList.remove('hidden');
            stats.classList.add('hidden');

            const startTime = performance.now();

            // 1. Wikipedia
            const wikiUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(query.replace(/ /g, '_'))}`;
            const wikiHtml = await scrapeWebsite(wikiUrl);
            const wikiData = wikiHtml ? parseWikipedia(wikiHtml, query, wikiUrl) : null;
            const movieData = wikiHtml ? parseMovieFromWikipedia(wikiHtml, query, wikiUrl) : null;
            const officialWebsite = wikiHtml ? extractOfficialWebsite(wikiHtml) : null;

            // 2. News (parallel)
            const newsPromises = NEWS_SOURCES.map(async source => {
                const searchUrl = source.searchUrl + encodeURIComponent(query);
                const html = await scrapeWebsite(searchUrl, 8000);
                return { config: source, html };
            });
            const newsResults = await Promise.all(newsPromises);

            // 3. ESPN
            const espnUrl = `https://www.espn.com/search/_/q/${encodeURIComponent(query)}`;
            const espnHtml = await scrapeWebsite(espnUrl);
            const espnData = espnHtml ? parseESPN(espnHtml) : [];

            loading.classList.add('hidden');
            const duration = ((performance.now() - startTime) / 1000).toFixed(2);

            // ✨ 1. Official Website Banner
            if (officialWebsite && wikiData) {
                renderOfficialSiteBanner(officialWebsite, wikiData.title);
            }

            // 🎬 2. Movie Card (if it's a movie)
            if (movieData && Object.keys(movieData.details).length > 0) {
                mainResults.innerHTML += renderMovieCard(movieData);
            }

            // 📚 3. Wikipedia Knowledge Panel
            if (wikiData && !movieData) {
                renderKnowledgePanel(wikiData);
            }

            // 🔗 4. Wikipedia Result Card
            if (wikiData) {
                mainResults.innerHTML += renderResultCard({
                    title: `${wikiData.title} - Wikipedia`,
                    url: wikiData.url,
                    snippet: wikiData.snippet,
                    source: 'Wikipedia',
                    sourceClass: '',
                    domain: 'en.wikipedia.org'
                });
            }

            // 📰 5. News Results
            const allNews = [];
            for (const result of newsResults) {
                if (result.html) {
                    const parsed = await parseNewsSource(result.html, result.config);
                    allNews.push(...parsed);
                }
            }
            
            const uniqueNews = allNews.filter((item, index, self) => 
                index === self.findIndex(i => i.title === item.title && i.domain === item.domain)
            ).slice(0, 12);

            if (uniqueNews.length > 0) {
                mainResults.innerHTML += `<h3 class="module-header">News Results</h3>`;
                uniqueNews.forEach(news => {
                    mainResults.innerHTML += renderResultCard(news);
                });
            }

            // 🏈 6. ESPN Results
            if (espnData.length > 0) {
                mainResults.innerHTML += `<h3 class="module-header">Sports</h3>`;
                espnData.forEach(sport => {
                    mainResults.innerHTML += renderResultCard(sport);
                });
            }

            // Fallback
            if (!wikiData && !movieData && uniqueNews.length === 0 && espnData.length === 0) {
                mainResults.innerHTML = `
                    <div class="py-12 text-center">
                        <div class="text-4xl mb-3">🔍</div>
                        <h3 class="text-lg font-medium text-gray-800 mb-1">No results found for "${query}"</h3>
                        <p class="text-gray-500 text-sm">Try different keywords or check spelling</p>
                    </div>
                `;
            }

            stats.innerText = `About ${mainResults.querySelectorAll('.result-card').length + (movieData ? 1 : 0)} results (${duration} seconds)`;
            stats.classList.remove('hidden');
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        window.addEventListener('DOMContentLoaded', () => searchInput.focus());
    </script>
</body>
