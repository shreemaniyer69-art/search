<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSearch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9f9f9;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e5e5e5;
            --accent: #1a73e8;
            --accent-hover: #1557b0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a1a;
                --bg-secondary: #252525;
                --bg-card: #2d2d2d;
                --text-primary: #f5f5f5;
                --text-secondary: #b3b3b3;
                --text-muted: #737373;
                --border: #404040;
                --accent: #5b9bd5;
                --accent-hover: #7eb3e0;
            }
        }
        
        * { box-sizing: border-box; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            min-height: 100vh;
        }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }
        
        .search-container {
            flex: 1;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 48px 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
            background: var(--bg-card);
        }
        
        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .search-btn:hover {
            background: var(--accent-hover);
        }
        
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .stats {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .welcome h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        /* Official Site */
        .official-site {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .official-site-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .official-site-content a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
        }
        
        .official-site-content a:hover {
            text-decoration: underline;
        }
        
        .official-site-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        /* Knowledge Panel */
        .knowledge-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        
        .kp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .kp-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        
        .kp-badge {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .kp-content {
            display: flex;
            gap: 20px;
        }
        
        .kp-image-container {
            width: 140px;
            height: 140px;
            border-radius: 8px;
            background: var(--bg-secondary);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .kp-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .kp-placeholder {
            font-size: 48px;
            opacity: 0.3;
        }
        
        .kp-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .kp-details {
            display: grid;
            grid-template-columns: max-content 1fr;
            gap: 8px 16px;
            font-size: 14px;
        }
        
        .kp-label {
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .kp-value {
            color: var(--text-primary);
        }
        
        .kp-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
        }
        
        /* Movie Card */
        .movie-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        
        .movie-header {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        
        .movie-poster-container {
            width: 110px;
            height: 165px;
            border-radius: 8px;
            background: var(--bg-secondary);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .movie-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px 0;
        }
        
        .movie-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .movie-rating {
            background: #f5c518;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .movie-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .movie-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px 20px;
            font-size: 14px;
        }
        
        .movie-detail-label {
            color: var(--text-muted);
            font-weight: 500;
        }
        
        /* Result Card - FIXED */
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .result-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .result-favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: var(--bg-secondary);
        }
        
        .result-source-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .badge-wiki { background: rgba(66, 133, 244, 0.15); color: #4285f4; }
        .badge-bbc { background: rgba(187, 25, 25, 0.15); color: #bb1919; }
        .badge-cnn { background: rgba(204, 0, 0, 0.15); color: #cc0000; }
        .badge-guardian { background: rgba(5, 41, 98, 0.15); color: #052962; }
        .badge-reuters { background: rgba(255, 128, 0, 0.15); color: #ff8000; }
        .badge-aljazeera { background: rgba(0, 150, 136, 0.15); color: #009688; }
        .badge-ap { background: rgba(0, 51, 102, 0.15); color: #003366; }
        .badge-espn { background: rgba(204, 0, 0, 0.15); color: #cc0000; }
        
        .result-title {
            margin: 0 0 8px 0;
        }
        
        .result-title a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.4;
            display: block;
        }
        
        .result-title a:hover {
            color: var(--accent);
        }
        
        .result-snippet {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
            min-height: 40px;
        }
        
        .result-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .result-url {
            color: var(--text-muted);
            text-decoration: none;
        }
        
        .result-url:hover {
            text-decoration: underline;
        }
        
        .module-header {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 32px 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .kp-content, .movie-header {
                flex-direction: column;
            }
            .kp-image-container, .movie-poster-container {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <div class="logo" onclick="location.reload()">
                <span class="logo-dot"></span>
                OmniSearch
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Ask anything..." class="search-input" autocomplete="off">
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div id="stats" class="stats hidden"></div>
        <div id="welcomeMessage" class="welcome">
            <h2>What would you like to know?</h2>
            <p>Search Wikipedia, news, movies, and sports.</p>
        </div>
        <div id="officialSiteBanner" class="hidden"></div>
        <div id="knowledgePanel" class="hidden knowledge-panel"></div>
        <div id="main-results"></div>
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <div>Searching sources...</div>
        </div>
    </main>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const mainResults = document.getElementById('main-results');
        const knowledgePanel = document.getElementById('knowledgePanel');
        const officialSiteBanner = document.getElementById('officialSiteBanner');
        const stats = document.getElementById('stats');
        const loading = document.getElementById('loading');
        const welcome = document.getElementById('welcomeMessage');

        const NEWS_SOURCES = [
            { name: 'BBC', domain: 'bbc.com', searchUrl: 'https://www.bbc.com/search?q=', badge: 'badge-bbc' },
            { name: 'CNN', domain: 'cnn.com', searchUrl: 'https://edition.cnn.com/search?q=', badge: 'badge-cnn' },
            { name: 'Guardian', domain: 'theguardian.com', searchUrl: 'https://www.theguardian.com/search?q=', badge: 'badge-guardian' },
            { name: 'Reuters', domain: 'reuters.com', searchUrl: 'https://www.reuters.com/site-search/?query=', badge: 'badge-reuters' },
            { name: 'Al Jazeera', domain: 'aljazeera.com', searchUrl: 'https://www.aljazeera.com/search/', badge: 'badge-aljazeera' },
            { name: 'AP News', domain: 'apnews.com', searchUrl: 'https://apnews.com/search/', badge: 'badge-ap' }
        ];

        async function scrapeWebsite(url, timeout = 10000) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                const response = await fetch(
                    `https://v0-web-scraper-api-three.vercel.app/api/proxy?url=${encodeURIComponent(url)}`,
                    { signal: controller.signal }
                );
                clearTimeout(timeoutId);
                if (!response.ok) return null;
                const data = await response.json();
                return data.html || null;
            } catch (error) {
                console.warn('Scrape failed:', url);
                return null;
            }
        }

        function extractCleanText(element) {
            if (!element) return '';
            const clone = element.cloneNode(true);
            clone.querySelectorAll('style, script, .reference, sup, .navbox, .infobox').forEach(el => el.remove());
            let text = clone.textContent || '';
            return text.replace(/\s+/g, ' ').replace(/\[\d+\]/g, '').trim();
        }

        function getFaviconUrl(domain) {
            return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        }

        function extractOfficialWebsite(html) {
            if (!html) return null;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const infobox = doc.querySelector('.infobox');
            if (!infobox) return null;
            
            for (const row of infobox.querySelectorAll('tr')) {
                const th = row.querySelector('th');
                const td = row.querySelector('td');
                if (!th || !td) continue;
                const label = extractCleanText(th).toLowerCase();
                if (['website', 'url', 'homepage', 'official'].some(w => label.includes(w))) {
                    const link = td.querySelector('a[href^="http"]');
                    if (link?.href) return { url: link.href, label: extractCleanText(th) };
                    const match = extractCleanText(td).match(/https?:\/\/[^\s\]]+/i);
                    if (match) return { url: match[0], label: extractCleanText(th) };
                }
            }
            return null;
        }

        function parseWikipedia(html, query, url) {
            if (!html || html.includes('Wikipedia does not have an article')) return null;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            doc.querySelectorAll('.reference, style, script, .navbox').forEach(el => el.remove());

            const title = doc.querySelector('#firstHeading')?.textContent || query;
            const paragraphs = Array.from(doc.querySelectorAll('.mw-parser-output > p'))
                .filter(p => {
                    const t = p.textContent.trim();
                    return t.length > 50 && !t.startsWith('This article is about');
                }).slice(0, 2);
            
            const snippet = (paragraphs[0] ? extractCleanText(paragraphs[0]).substring(0, 280) : '') + '...';
            const description = paragraphs[0] ? extractCleanText(paragraphs[0]) : '';
            
            const img = doc.querySelector('.infobox img, .thumbimage');
            let imageUrl = null;
            if (img) {
                const src = img.src || img.getAttribute('data-src');
                imageUrl = src?.startsWith('//') ? 'https:' + src : src;
            }
            
            const data = {};
            const infobox = doc.querySelector('.infobox');
            if (infobox) {
                infobox.querySelectorAll('tr').forEach(row => {
                    const th = row.querySelector('th');
                    const td = row.querySelector('td');
                    if (th && td) {
                        const label = extractCleanText(th);
                        const value = extractCleanText(td);
                        if (label && value && label.length < 30) data[label] = value;
                    }
                });
            }
            return { title, snippet, description, url, imageUrl, data };
        }

        function parseMovieFromWikipedia(html, query, url) {
            if (!html) return null;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const infobox = doc.querySelector('.infobox');
            if (!infobox) return null;
            
            const hasMovieFields = Array.from(infobox.querySelectorAll('th')).some(th => {
                const t = extractCleanText(th).toLowerCase();
                return ['director', 'starring', 'release date', 'running time'].some(k => t.includes(k));
            });
            if (!hasMovieFields) return null;
            
            const title = doc.querySelector('#firstHeading')?.textContent || query;
            const desc = Array.from(doc.querySelectorAll('.mw-parser-output > p')).find(p => p.textContent.trim().length > 50);
            const description = desc ? extractCleanText(desc) : '';
            
            const poster = doc.querySelector('.infobox img');
            let posterUrl = null;
            if (poster) {
                const src = poster.src || poster.getAttribute('data-src');
                posterUrl = src?.startsWith('//') ? 'https:' + src : src;
            }
            
            const movie = { title, description, url, posterUrl, details: {} };
            infobox.querySelectorAll('tr').forEach(row => {
                const th = row.querySelector('th');
                const td = row.querySelector('td');
                if (th && td) {
                    const label = extractCleanText(th);
                    const value = extractCleanText(td);
                    if (['Director', 'Starring', 'Release date', 'Genre', 'Running time'].some(f => label.includes(f))) {
                        movie.details[label] = value;
                    }
                }
            });
            return Object.keys(movie.details).length > 0 ? movie : null;
        }

        // FIXED: Better news parsing
        async function parseNewsSource(html, sourceConfig) {
            if (!html) return [];
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const results = [];
            const seen = new Set();
            
            // Try multiple selector patterns
            const selectors = [
                'article a[href*="/"]',
                '.story a[href*="/"]',
                '[class*="card"] a[href*="/"]',
                'h2 a[href], h3 a[href]',
                'a[href*="/news/"], a[href*="/article/"], a[href*="/story/"]'
            ];
            
            for (const selector of selectors) {
                if (results.length >= 4) break;
                const links = doc.querySelectorAll(selector);
                
                for (const link of links) {
                    if (results.length >= 4) break;
                    
                    const href = link.getAttribute('href');
                    if (!href || href.includes('privacy') || href.includes('subscribe')) continue;
                    
                    let title = extractCleanText(link).trim();
                    if (title.length < 30 || title.length > 140) continue;
                    if (seen.has(title.toLowerCase())) continue;
                    
                    // Find parent article for snippet
                    let snippet = '';
                    const parent = link.closest('article, .story, [class*="card"]');
                    if (parent) {
                        const desc = parent.querySelector('p, [class*="summary"], [class*="description"]');
                        if (desc) snippet = extractCleanText(desc);
                    }
                    if (!snippet) snippet = 'Read the full article on ' + sourceConfig.name + '.';
                    if (snippet.length > 200) snippet = snippet.substring(0, 197) + '...';
                    
                    // Build URL
                    let fullUrl = href;
                    if (!fullUrl.startsWith('http')) {
                        fullUrl = `https://${sourceConfig.domain}${fullUrl.startsWith('/') ? fullUrl : '/' + fullUrl}`;
                    }
                    
                    // Find date
                    let date = null;
                    if (parent) {
                        const timeEl = parent.querySelector('time, [class*="date"]');
                        if (timeEl) date = timeEl.getAttribute('datetime') || extractCleanText(timeEl);
                    }
                    
                    seen.add(title.toLowerCase());
                    results.push({
                        title,
                        snippet,
                        url: fullUrl,
                        source: sourceConfig.name,
                        badge: sourceConfig.badge,
                        domain: sourceConfig.domain,
                        date: date && date.length < 30 ? date : null
                    });
                }
            }
            return results;
        }

        function parseESPN(html) {
            if (!html) return [];
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const results = [];
            const seen = new Set();
            
            const links = doc.querySelectorAll('a[href*="/story/"], a[href*="/video/"]');
            for (const link of links) {
                if (results.length >= 3) break;
                const href = link.getAttribute('href');
                if (!href) continue;
                
                let title = extractCleanText(link).trim();
                if (title.length < 25 || title.length > 140) continue;
                if (seen.has(title.toLowerCase())) continue;
                
                const url = href.startsWith('http') ? href : `https://www.espn.com${href}`;
                seen.add(title.toLowerCase());
                
                results.push({
                    title,
                    snippet: 'Latest from ESPN.',
                    url,
                    source: 'ESPN',
                    badge: 'badge-espn',
                    domain: 'espn.com',
                    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                });
            }
            return results;
        }

        function renderOfficialSite(websiteInfo, pageTitle) {
            const domain = websiteInfo.url.replace(/^https?:\/\//, '').replace(/^www\./, '');
            officialSiteBanner.innerHTML = `
                <a href="${websiteInfo.url}" target="_blank" class="block no-underline">
                    <div class="official-site">
                        <div class="official-site-icon">🔗</div>
                        <div class="official-site-content">
                            <a href="${websiteInfo.url}" target="_blank" class="no-underline">${domain}</a>
                            <div class="official-site-meta">Official website • Found on Wikipedia • ${pageTitle}</div>
                        </div>
                    </div>
                </a>
            `;
            officialSiteBanner.classList.remove('hidden');
        }

        function renderKnowledgePanel(data) {
            if (!data) return;
            
            const imageHtml = data.imageUrl 
                ? `<div class="kp-image-container"><img src="${data.imageUrl}" class="kp-image" alt="" onerror="this.parentElement.innerHTML='<span class=\\'kp-placeholder\\'>📄</span>'"></div>`
                : `<div class="kp-image-container"><span class="kp-placeholder">📄</span></div>`;
            
            let detailsHtml = '';
            const fields = ['Born', 'Died', 'Spouse', 'Education', 'Occupation', 'Founded', 'Headquarters'];
            Object.entries(data.data || {}).forEach(([label, value]) => {
                if (fields.some(f => label.toLowerCase().includes(f.toLowerCase()))) {
                    detailsHtml += `<span class="kp-label">${label}</span><span class="kp-value">${value}</span>`;
                }
            });
            
            knowledgePanel.innerHTML = `
                <div class="kp-header">
                    <h2 class="kp-title">${data.title}</h2>
                    <span class="kp-badge">Wikipedia</span>
                </div>
                <div class="kp-content">
                    ${imageHtml}
                    <div>
                        <p class="kp-description">${data.description || data.snippet}</p>
                        ${detailsHtml ? `<div class="kp-details">${detailsHtml}</div>` : ''}
                        <a href="${data.url}" target="_blank" class="kp-link">Read on Wikipedia →</a>
                    </div>
                </div>
            `;
            knowledgePanel.classList.remove('hidden');
        }

        function renderMovieCard(movie) {
            let detailsHtml = '';
            Object.entries(movie.details).forEach(([label, value]) => {
                detailsHtml += `<div><span class="movie-detail-label">${label}:</span> ${value}</div>`;
            });
            
            const posterHtml = movie.posterUrl 
                ? `<div class="movie-poster-container"><img src="${movie.posterUrl}" class="movie-poster" alt="" onerror="this.parentElement.innerHTML='<span class=\\'kp-placeholder\\'>🎬</span>'"></div>`
                : `<div class="movie-poster-container"><span class="kp-placeholder">🎬</span></div>`;
            
            return `
                <div class="movie-card">
                    <div class="movie-header">
                        ${posterHtml}
                        <div>
                            <h2 class="movie-title">${movie.title}</h2>
                            <div class="movie-meta">
                                ${movie.details['Release date'] || ''}
                                ${movie.details['Genre'] ? `<span style="color:var(--accent)">${movie.details['Genre']}</span>` : ''}
                            </div>
                            <p class="movie-description">${movie.description}</p>
                            ${detailsHtml ? `<div class="movie-details">${detailsHtml}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResultCard({ title, url, snippet, source, badge, domain, date }) {
            // Validate data before rendering
            if (!title || !url || !snippet) return '';
            
            const faviconUrl = getFaviconUrl(domain);
            const displayDomain = domain.replace(/^www\./, '');
            
            return `
                <div class="result-card" onclick="window.open('${url}', '_blank')">
                    <div class="result-header">
                        <img src="${faviconUrl}" class="result-favicon" alt="" onerror="this.style.display='none'">
                        <span class="result-source-badge ${badge}">${source}</span>
                    </div>
                    <h3 class="result-title">
                        <a href="${url}" target="_blank" onclick="event.stopPropagation()">${title}</a>
                    </h3>
                    <p class="result-snippet">${snippet}</p>
                    <div class="result-meta">
                        <a href="${url}" class="result-url" target="_blank" onclick="event.stopPropagation()">${displayDomain}</a>
                        ${date ? `<span>• ${date}</span>` : ''}
                    </div>
                </div>
            `;
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            welcome.classList.add('hidden');
            mainResults.innerHTML = '';
            knowledgePanel.classList.add('hidden');
            officialSiteBanner.classList.add('hidden');
            loading.classList.remove('hidden');
            stats.classList.add('hidden');

            const startTime = performance.now();

            // Wikipedia
            const wikiUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(query.replace(/ /g, '_'))}`;
            const wikiHtml = await scrapeWebsite(wikiUrl);
            const wikiData = wikiHtml ? parseWikipedia(wikiHtml, query, wikiUrl) : null;
            const movieData = wikiHtml ? parseMovieFromWikipedia(wikiHtml, query, wikiUrl) : null;
            const officialWebsite = wikiHtml ? extractOfficialWebsite(wikiHtml) : null;

            // News - parallel with better error handling
            const newsPromises = NEWS_SOURCES.map(async source => {
                const searchUrl = source.searchUrl + encodeURIComponent(query);
                const html = await scrapeWebsite(searchUrl, 8000);
                if (!html) return { name: source.name, results: [] };
                const results = await parseNewsSource(html, source);
                return { name: source.name, results };
            });
            const newsResponses = await Promise.all(newsPromises);
            const allNews = newsResponses.flatMap(r => r.results);

            // ESPN
            const espnUrl = `https://www.espn.com/search/_/q/${encodeURIComponent(query)}`;
            const espnHtml = await scrapeWebsite(espnUrl, 8000);
            const espnData = espnHtml ? parseESPN(espnHtml) : [];

            loading.classList.add('hidden');
            const duration = ((performance.now() - startTime) / 1000).toFixed(2);

            // Render
            if (officialWebsite && wikiData) renderOfficialSite(officialWebsite, wikiData.title);
            
            if (movieData) {
                mainResults.innerHTML += renderMovieCard(movieData);
            } else if (wikiData) {
                renderKnowledgePanel(wikiData);
            }

            if (wikiData) {
                const wikiCard = renderResultCard({
                    title: `${wikiData.title} — Wikipedia`,
                    url: wikiData.url,
                    snippet: wikiData.snippet,
                    source: 'Wikipedia',
                    badge: 'badge-wiki',
                    domain: 'en.wikipedia.org'
                });
                if (wikiCard) mainResults.innerHTML += wikiCard;
            }

            // Dedupe and render news
            const uniqueNews = allNews.filter((item, i, arr) => 
                i === arr.findIndex(x => x.title === item.title)
            ).slice(0, 8);

            if (uniqueNews.length > 0) {
                mainResults.innerHTML += `<div class="module-header">📰 News</div>`;
                uniqueNews.forEach(news => {
                    const card = renderResultCard(news);
                    if (card) mainResults.innerHTML += card;
                });
            }

            if (espnData.length > 0) {
                mainResults.innerHTML += `<div class="module-header">🏈 Sports</div>`;
                espnData.forEach(sport => {
                    const card = renderResultCard(sport);
                    if (card) mainResults.innerHTML += card;
                });
            }

            if (!wikiData && !movieData && uniqueNews.length === 0 && espnData.length === 0) {
                mainResults.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:48px;margin-bottom:16px;opacity:0.6">🔍</div>
                        <div style="font-size:16px;font-weight:500;margin-bottom:8px">No results found</div>
                        <div style="color:var(--text-muted)">Try a different query</div>
                    </div>
                `;
            }

            const count = mainResults.querySelectorAll('.result-card').length + (movieData || wikiData ? 1 : 0);
            stats.textContent = `~${count} results • ${duration}s`;
            stats.classList.remove('hidden');
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        window.addEventListener('DOMContentLoaded', () => searchInput.focus());
    </script>
</body>
</html>
